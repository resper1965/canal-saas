name: CI — Canal SaaS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: cd admin && npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E API tests
        run: npx playwright test e2e/api-v1.spec.ts --reporter=github
        env:
          CANAL_API_URL: https://canal.bekaa.eu
